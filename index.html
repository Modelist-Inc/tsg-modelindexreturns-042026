<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSG Advice Partners - Model Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Big+Shoulders+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --black:#000; --soft-black:#1A1A1A; --navy:#0C4160; --slate:#68869A;
  --white:#FFF; --warm-gray:#DAD9D6; --blue-gray:#D7E0EB;
  --terra:#B4654A; --teal:#2E8B7A; --gold:#A68B5B; --plum:#5B4A6A; --sage:#3D6B5E;
  --border:#E4E4E0; --muted:#7A8A95;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Lato',sans-serif;color:var(--soft-black);background:#F6F6F3;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
.display{font-family:'Big Shoulders Display',sans-serif;letter-spacing:0.04em;text-transform:uppercase}
.label{font-size:8px;font-weight:400;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase}
a{color:inherit}

.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
.sidebar{background:var(--soft-black);color:var(--white);padding:24px 20px;display:flex;flex-direction:column;gap:16px;position:sticky;top:0;height:100vh;overflow:hidden}
.main{padding:40px 56px 80px;max-width:1400px;overflow-x:hidden}

.brand{padding:4px 4px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.brand-logo{width:100%;max-width:240px;height:auto;display:block}
.brand-sub{font-size:9px;color:var(--slate);letter-spacing:0.2em;text-transform:uppercase;margin-top:6px;padding-left:2px}

.confid-banner{background:var(--soft-black);color:#fff;padding:6px 12px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;text-align:center;margin:-40px -56px 24px;font-family:'Lato',sans-serif}
.confid-banner span{color:var(--terra);margin:0 8px}

.disclosure-full{margin-top:20px;background:#fff;border:1px solid var(--border)}
.disclosure-full summary{padding:14px 20px;cursor:pointer;font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;color:var(--navy);background:#F6F6F3;list-style:none;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid transparent}
.disclosure-full summary::-webkit-details-marker{display:none}
.disclosure-full summary::after{content:'＋';font-size:18px;color:var(--terra);font-weight:400}
.disclosure-full[open] summary{border-bottom-color:var(--border)}
.disclosure-full[open] summary::after{content:'－'}
.disclosure-full .body{padding:22px 24px 28px;font-size:11.5px;line-height:1.6;color:#333}
.disclosure-full .body h4{font-family:'Lato',sans-serif;font-weight:900;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--navy);margin-top:18px;margin-bottom:6px}
.disclosure-full .body h4:first-child{margin-top:0}
.disclosure-full .body p{margin-bottom:8px}
.disclosure-full .body .caps{text-transform:uppercase;font-weight:700;font-size:10.5px;letter-spacing:0.04em}
.ac-map-table{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:8px}
.ac-map-table th,.ac-map-table td{padding:4px 8px;text-align:left;border-bottom:1px solid #F0F0EE}
.ac-map-table th{color:var(--slate);font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;border-bottom:1px solid var(--navy);background:#F6F6F3;position:sticky;top:0}
.ac-map-table tr.cat-equity td:first-child{color:var(--navy);font-weight:700}
.ac-map-table tr.cat-fi td:first-child{color:var(--sage);font-weight:700}
.ac-map-table tr.cat-alt td:first-child{color:var(--terra);font-weight:700}
.ac-map-table tr.cat-cash td:first-child{color:var(--gold);font-weight:700}
.ac-map-wrap{max-height:420px;overflow-y:auto;border:1px solid #F0F0EE;margin-top:6px}

.search-box{position:relative}
.search-box input{
  width:100%;background:#000;border:1px solid #333;color:#fff;
  padding:10px 12px 10px 34px;font-family:inherit;font-size:13px;outline:none;
}
.search-box input:focus{border-color:var(--slate)}
.search-box::before{content:'';position:absolute;left:12px;top:50%;width:13px;height:13px;transform:translateY(-50%);
  background:no-repeat center/contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2368869A' stroke-width='2'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.5' y2='16.5'/></svg>")}

.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;padding:4px 10px;background:transparent;border:1px solid #333;color:#b4b4b4;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;font-family:inherit;transition:all 0.15s}
.chip:hover{border-color:var(--slate);color:#fff}
.chip.active{background:var(--slate);border-color:var(--slate);color:#fff}

.series-list{flex:1;overflow-y:auto;margin:0 -20px;padding:0 20px}
.series-list::-webkit-scrollbar{width:6px}
.series-list::-webkit-scrollbar-track{background:transparent}
.series-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.series-group{margin-bottom:10px}
.series-header{font-size:9px;color:var(--slate);letter-spacing:0.2em;text-transform:uppercase;padding:6px 0 4px;border-bottom:1px solid #333;margin-bottom:4px;display:flex;justify-content:space-between}
.series-header .count{color:#666}
.strat-item{padding:7px 8px;cursor:pointer;font-size:12px;border-left:2px solid transparent;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:background 0.12s}
.strat-item:hover{background:rgba(255,255,255,0.04)}
.strat-item.active{background:rgba(180,101,74,0.15);border-left-color:var(--terra)}
.strat-item .sid{color:var(--slate);font-size:9px;letter-spacing:0.1em;font-weight:700}
.strat-item .sname{flex:1;color:#e4e4e4}
.strat-item .srisk{color:#888;font-size:8.5px;letter-spacing:0.06em;font-weight:700}
.strat-item.active .sname{color:#fff}

.sidebar-footer{padding-top:12px;border-top:1px solid #222;font-size:10px;color:#555;letter-spacing:0.08em}

.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;padding-bottom:24px;border-bottom:1px solid var(--border);margin-bottom:28px}
.hero-left{flex:1;min-width:0}
.hero-badges{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.badge{font-size:9px;padding:3px 9px;background:var(--blue-gray);color:var(--navy);letter-spacing:0.16em;text-transform:uppercase;font-weight:700}
.badge.terra{background:var(--terra);color:#fff}
.badge.sage{background:var(--sage);color:#fff}
.badge.gold{background:var(--gold);color:#fff}
.badge.plum{background:var(--plum);color:#fff}
.badge.outline{background:transparent;border:1px solid var(--navy);color:var(--navy)}
.hero-title{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:42px;line-height:1.05;letter-spacing:0.02em;color:var(--soft-black);margin-bottom:6px}
.hero-id{color:var(--slate);font-size:11px;letter-spacing:0.18em;margin-bottom:12px}
.hero-overview{font-size:15px;color:#333;max-width:780px;line-height:1.55}

.hero-right{text-align:right;font-size:11px;color:var(--muted);letter-spacing:0.04em;flex-shrink:0;min-width:240px}
.hero-right .k{color:var(--slate);text-transform:uppercase;letter-spacing:0.18em;font-size:9px;margin-bottom:1px;margin-top:10px}
.hero-right .k:first-child{margin-top:0}
.hero-right .v{color:var(--soft-black);font-size:13px;font-weight:700;line-height:1.35}
.hero-right .holdings-call{display:flex;gap:14px;justify-content:flex-end;align-items:baseline;margin-top:2px}
.hero-right .holdings-call .big{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:26px;color:var(--navy);letter-spacing:0.02em;line-height:1}
.hero-right .holdings-call .lbl{font-size:8px;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;margin-top:4px}
.hero-right .holdings-call .divider{color:var(--warm-gray);font-size:22px;line-height:1}

.kpi-row{display:grid;grid-template-columns:repeat(6, 1fr);gap:0;margin-bottom:26px;border:1px solid var(--border);background:#fff}
.kpi{padding:14px 16px;border-right:1px solid var(--border);position:relative;display:flex;flex-direction:column;gap:4px}
.kpi:last-child{border-right:none}
.kpi .label{margin-bottom:4px}
.kpi .val{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-0.01em;font-family:'Lato';line-height:1.1}
.kpi .val.pos{color:var(--teal)}
.kpi .val.neg{color:var(--terra)}
.kpi .sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.35}
.kpi .bmk-row{display:flex;justify-content:space-between;gap:6px;font-size:10px;margin-top:2px;align-items:baseline}
.kpi .bmk-lbl{letter-spacing:0.1em;text-transform:uppercase;font-size:8.5px;color:var(--slate);font-weight:700}
.kpi .bmk-val{color:#333;font-weight:700;font-size:11px}
.kpi .delta{display:inline-block;font-size:10px;font-weight:700;margin-top:2px;padding:1.5px 6px;letter-spacing:0.04em;align-self:flex-start}
.kpi .delta.pos{background:rgba(46,139,122,0.12);color:var(--teal)}
.kpi .delta.neg{background:rgba(180,101,74,0.12);color:var(--terra)}
.kpi .delta.flat{background:#EEEEEA;color:var(--muted)}
.kpi.single .bmk-row{visibility:hidden}
.kpi.single .delta{visibility:hidden}

.tabs{display:flex;gap:2px;margin-bottom:28px;background:#fff;border:1px solid var(--border);padding:4px;width:fit-content}
.tab{padding:9px 22px;font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;background:transparent;border:none;color:var(--slate);cursor:pointer;transition:all 0.15s;border-bottom:2px solid transparent}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);background:#F6F6F3;border-bottom-color:var(--terra)}
.tab-panel{display:none}
.tab-panel.active{display:block}

.section{margin-bottom:32px}
.section-label{font-size:9px;color:var(--slate);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:6px}
.section-rule{height:1px;background:var(--warm-gray);margin-bottom:16px}
.section-title{font-family:'Lato';font-weight:700;font-size:18px;color:var(--navy);margin-bottom:14px;letter-spacing:-0.005em}

.card{background:#fff;border:1px solid var(--border);padding:22px}
.card h3{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;letter-spacing:0.02em}
.card h3 .subtitle{font-weight:400;color:var(--muted);font-size:11px;margin-left:8px;letter-spacing:0.04em}
.card h3 .tag{font-size:9px;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;float:right;background:#F6F6F3;padding:2px 8px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:18px;align-items:stretch}
.stack{display:flex;flex-direction:column;gap:18px}

.chart-wrap{position:relative;width:100%}
.chart-wrap.h180{height:180px}
.chart-wrap.h220{height:220px}
.chart-wrap.h260{height:260px}
.chart-wrap.h300{height:300px}
.chart-wrap.h340{height:340px}
.chart-wrap.h400{height:400px}
.chart-wrap.h440{height:440px}

table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data th,table.data td{padding:5px 8px;text-align:right;border-bottom:1px solid #F0F0EE}
table.data th{color:var(--slate);font-weight:700;text-align:right;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;border-bottom:1px solid var(--navy)}
table.data th:first-child,table.data td:first-child{text-align:left}
table.data tr:last-child td{border-bottom:none}
table.data td.pos{color:var(--teal)}
table.data td.neg{color:var(--terra)}
table.data td.hl{font-weight:700;background:#F6F6F3}
table.data tbody tr:hover td{background:#FAFAF7}

.annual-table{max-height:480px;overflow-y:auto}
.annual-table::-webkit-scrollbar{width:6px}
.annual-table::-webkit-scrollbar-thumb{background:var(--warm-gray)}

.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:8px}
.gauge-val{font-size:36px;font-weight:900;color:var(--navy);font-family:'Big Shoulders Display';letter-spacing:0.02em;margin-top:-48px}
.gauge-label{font-size:10px;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;margin-top:8px}
.gauge-scale{display:flex;justify-content:space-between;width:180px;font-size:9px;color:var(--muted);margin-top:4px}

.metric-cell{padding:10px 12px;background:#F6F6F3;border-left:3px solid var(--slate)}
.metric-cell .mc-label{font-size:8.5px;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.metric-cell .mc-stats{display:flex;justify-content:space-between;gap:6px;font-size:11px;color:#333}
.metric-cell .mc-stats .mc-stat{flex:1;text-align:center}
.metric-cell .mc-stats .mc-stat .n{font-family:'Big Shoulders Display';font-weight:700;font-size:18px;color:var(--navy);display:block;line-height:1}
.metric-cell .mc-stats .mc-stat .k{font-size:7.5px;color:var(--slate);letter-spacing:0.14em;text-transform:uppercase;margin-top:3px;display:block}

.scatter-container{position:relative}
.scatter-quads{position:absolute;inset:14px 14px 76px 58px;pointer-events:none;font-size:10px;color:var(--slate);letter-spacing:0.1em;text-transform:uppercase;font-weight:700}
.scatter-quads .q{position:absolute;background:rgba(255,255,255,0.85);padding:1px 4px}
.scatter-quads .q-tl{top:2px;left:2px}
.scatter-quads .q-tr{top:2px;right:2px}
.scatter-quads .q-bl{bottom:2px;left:2px;color:var(--terra)}
.scatter-quads .q-br{bottom:2px;right:2px;color:var(--terra)}
.scatter-quads .q-tl{color:var(--teal)}
.scatter-quads .q-tr{color:var(--teal)}

.regime-table .r-bull{background:#E8F0E8;color:#3D6B5E;font-weight:700;padding:1px 8px;font-size:9px;letter-spacing:0.1em;display:inline-block;min-width:52px;text-align:center}
.regime-table .r-bear{background:#F4E2DD;color:#B4654A;font-weight:700;padding:1px 8px;font-size:9px;letter-spacing:0.1em;display:inline-block;min-width:52px;text-align:center}
.regime-legend{display:flex;gap:14px;font-size:10px;color:var(--muted);margin-top:8px}
.regime-legend .lg{display:flex;align-items:center;gap:5px}
.regime-legend .lg .sw{width:14px;height:10px;display:inline-block}

.holdings-list{display:flex;flex-direction:column;gap:0;max-height:540px;overflow-y:auto}
.holdings-list::-webkit-scrollbar{width:6px}
.holdings-list::-webkit-scrollbar-thumb{background:var(--warm-gray)}
.holdings-cat-header{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;padding:8px 4px 4px;border-bottom:1px solid var(--border);margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.holdings-cat-header:first-child{margin-top:0}
.holdings-cat-header.cat-equity{color:var(--navy)}
.holdings-cat-header.cat-fi{color:var(--sage)}
.holdings-cat-header.cat-alt{color:var(--terra)}
.holdings-cat-header.cat-cash{color:var(--gold)}
.holdings-cat-header .ch-tot{font-size:11px;font-weight:700;color:#333}

.holding-row{display:grid;grid-template-columns:170px 70px 1fr 70px 110px 70px;gap:12px;padding:7px 6px;border-bottom:1px solid #F4F4F0;align-items:center;font-size:11.5px;text-align:left}
.holding-row.head{font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--slate);font-weight:700;padding:4px 6px;border-bottom:1px solid var(--border);text-align:left}
.holding-row .hrac{font-size:11px;color:#333;font-weight:600;display:flex;align-items:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.holding-row .hrt{color:var(--slate);font-weight:700;font-size:10.5px;letter-spacing:0.04em}
.holding-row .hrn{color:#333;font-weight:600;font-size:11.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.holding-row .hrw{font-weight:700;color:var(--navy)}
.holding-row .hre,.holding-row .hry{color:#333;font-weight:400;font-size:11px}
.holding-cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

/* Strategy weights bar */
.strategy-bars{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.strategy-row{display:grid;grid-template-columns:230px 1fr 60px;gap:14px;align-items:center;padding:7px 0;border-bottom:1px solid #F4F4F0}
.strategy-row:last-child{border-bottom:none}
.strategy-row .sn-name{font-size:11.5px;color:#333;font-weight:700}
.strategy-row .sn-num{color:var(--slate);font-size:9px;letter-spacing:0.1em;font-weight:700;margin-right:6px}
.strategy-row .sn-bar{position:relative;height:18px;background:#F0F0EE}
.strategy-row .sn-bar-fill{position:absolute;top:0;left:0;bottom:0;background:var(--navy);transition:width 0.3s}
.strategy-row .sn-bar-fill.fi{background:var(--sage)}
.strategy-row .sn-bar-fill.alt{background:var(--terra)}
.strategy-row .sn-bar-fill.cash{background:var(--gold)}
.strategy-row .sn-bar-fill.tactical{background:var(--plum)}
.strategy-row .sn-w{text-align:right;font-weight:700;color:var(--navy);font-size:12px}

.prose{font-size:13.5px;line-height:1.65;color:#333}
.prose p{margin-bottom:10px}

.disclosure{font-size:10px;color:var(--muted);line-height:1.5;padding:20px;background:#EEEEEA;border-top:3px solid var(--navy);margin-top:32px}
.disclosure strong{color:var(--soft-black)}

.nav-btns{display:flex;gap:8px;margin-top:32px;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 18px;background:#fff;border:1px solid var(--navy);color:var(--navy);font-family:inherit;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.15s}
.nav-btn:hover{background:var(--navy);color:#fff}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.nav-btn.primary{background:var(--terra);border-color:var(--terra);color:#fff}
.nav-btn.primary:hover{background:#9C5640}
.nav-counter{font-size:11px;color:var(--slate);letter-spacing:0.12em}

.note-banner{background:#F6F6F3;border-left:3px solid var(--slate);padding:10px 14px;font-size:11px;color:#444;line-height:1.55;margin-bottom:14px}

@media (max-width: 1200px){
  .app{grid-template-columns:280px 1fr}
  .main{padding:32px 32px 60px}
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .kpi:nth-child(3){border-right:none}
  .kpi:nth-child(n+4){border-top:1px solid var(--border)}
}
@media (max-width: 900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:40vh}
  .hero{flex-direction:column}
  .hero-right{text-align:left}
  .grid-2,.grid-3,.grid-23{grid-template-columns:1fr}
  .hero-title{font-size:32px}
  .main{padding:24px 20px 60px}
}
</style>
</head>
<body>
<div class="app">

function buildACColorMap(model){
  const map = {};
  const h = model.holdingsHistory;
  if(!h || !h.classes) return map;
  // For models we use the current snapshot (single point), so rank by current weight
  const lastIdx = h.weights.length - 1;
  const perClass = h.classes.map((c, j) => {
    return {ac: c, max: h.weights[lastIdx][j], cat: classCategory(c, model)};
  });
  const byCat = {};
  perClass.forEach(x => { (byCat[x.cat] ||= []).push(x); });
  for(const cat in byCat){
    byCat[cat].sort((a,b) => b.max - a.max);
    const palette = CATEGORY_SHADES[cat] || CATEGORY_SHADES['Alternative'];
    byCat[cat].forEach((x, i) => { map[x.ac] = palette[i % palette.length]; });
  }
  return map;
}

// ====================== ANALYTICS ======================
function computeAnalytics(model){
  const dates = model.dates;
  const s = model.sLvl; const b = model.bLvl;
  const n = dates.length;
  if(n < 2) return null;

  function annRet(levels, months){
    if(levels.length-1 < months) return null;
    const end = levels[levels.length-1]; const start = levels[levels.length-1-months];
    return Math.pow(end/start, 12/months) - 1;
  }
  function itdRet(levels){
    const years = (new Date(dates[n-1]) - new Date(dates[0]))/(365.25*24*3600*1000);
    if(years<=0) return null;
    return Math.pow(levels[n-1]/levels[0], 1/years) - 1;
  }
  function ytdRet(levels){
    const endDate = new Date(dates[n-1]);
    const y = endDate.getFullYear();
    let idx = -1;
    for(let i=0;i<n;i++){
      const d = new Date(dates[i]);
      if(d.getFullYear()===y-1 && d.getMonth()===11) idx = i;
    }
    if(idx<0) return null;
    return levels[n-1]/levels[idx] - 1;
  }
  function annualCal(levels){
    const out = {};
    const decIdx = {};
    for(let i=0;i<n;i++){
      const d = new Date(dates[i]);
      if(d.getMonth()===11) decIdx[d.getFullYear()] = i;
    }
    const years = Object.keys(decIdx).map(Number).sort();
    for(const y of years){
      if(decIdx[y-1] != null) out[y] = levels[decIdx[y]]/levels[decIdx[y-1]] - 1;
    }
    const endDate = new Date(dates[n-1]);
    const cy = endDate.getFullYear();
    if(endDate.getMonth() !== 11 && decIdx[cy-1] != null){
      out[cy + '_YTD'] = levels[n-1]/levels[decIdx[cy-1]] - 1;
    }
    return out;
  }
  function ddSeries(levels){
    const out=[]; let peak = levels[0];
    for(let i=0;i<n;i++){ peak = Math.max(peak, levels[i]); out.push({date: dates[i], dd: levels[i]/peak - 1}); }
    return out;
  }
  function rolling12(levels){
    const out = [];
    for(let i=12;i<n;i++) out.push({date: dates[i], r: levels[i]/levels[i-12] - 1});
    return out;
  }
  function rollingVol(levels){
    const rets = [];
    for(let i=1;i<n;i++) rets.push(levels[i]/levels[i-1] - 1);
    const out = [];
    for(let i=11;i<rets.length;i++){
      const win = rets.slice(i-11, i+1);
      const mean = win.reduce((a,b)=>a+b,0)/win.length;
      const v = win.reduce((a,b)=>a+(b-mean)**2,0)/(win.length-1);
      out.push({date: dates[i+1], vol: Math.sqrt(v*12)});
    }
    return out;
  }

  const growthS = s.map((v,i)=>({date:dates[i], v: v/s[0] - 1}));
  const growthB = b.map((v,i)=>({date:dates[i], v: v/b[0] - 1}));

  return {
    annRet: {
      model: {
        YTD: ytdRet(s), '1Y': annRet(s,12), '3Y': annRet(s,36), '5Y': annRet(s,60),
        '10Y': annRet(s,120), '20Y': annRet(s,240), ITD: itdRet(s),
      },
      bench: {
        YTD: ytdRet(b), '1Y': annRet(b,12), '3Y': annRet(b,36), '5Y': annRet(b,60),
        '10Y': annRet(b,120), '20Y': annRet(b,240), ITD: itdRet(b),
      },
    },
    annualCal: { model: annualCal(s), bench: annualCal(b) },
    ddS: ddSeries(s), ddB: ddSeries(b),
    roll12S: rolling12(s), roll12B: rolling12(b),
    volS: rollingVol(s), volB: rollingVol(b),
    growthS, growthB,
  };
}

function scatterData(model){
  const n = model.dates.length;
  const s = model.sLvl; const b = model.bLvl;
  if(n < 13) return [];
  const pts = [];
  const sRet = []; const bRet = [];
  for(let i=1;i<n;i++){ sRet.push(s[i]/s[i-1]-1); bRet.push(b[i]/b[i-1]-1); }
  for(let i=12;i<n;i++){
    const r_s = s[i]/s[i-12] - 1;
    const r_b = b[i]/b[i-12] - 1;
    const wS = sRet.slice(i-12, i);
    const wB = bRet.slice(i-12, i);
    const ms = wS.reduce((a,b)=>a+b,0)/wS.length;
    const mb = wB.reduce((a,b)=>a+b,0)/wB.length;
    const vs = Math.sqrt(wS.reduce((a,x)=>a+(x-ms)**2,0)/(wS.length-1) * 12);
    const vb = Math.sqrt(wB.reduce((a,x)=>a+(x-mb)**2,0)/(wB.length-1) * 12);
    pts.push({date: model.dates[i], excessR: r_s - r_b, excessV: vs - vb});
  }
  return pts;
}

function regimeAnalysis(model, ddThresh = -0.10){
  const dates = model.dates; const s = model.sLvl; const b = model.bLvl;
  const n = dates.length;
  const regimes = [];
  let state = 'bull';
  let bullStart = 0;
  let peakLevel = b[0], peakIdx = 0;
  let troughLevel = null, troughIdx = null;
  let recoveryTarget = null;

  for(let i=1;i<n;i++){
    const v = b[i];
    if(state === 'bull'){
      if(v >= peakLevel){ peakLevel = v; peakIdx = i; }
      else if(v/peakLevel - 1 <= ddThresh){
        if(peakIdx > bullStart) regimes.push({type:'Bull', start: bullStart, end: peakIdx});
        state = 'bear';
        troughLevel = v; troughIdx = i;
        recoveryTarget = peakLevel;
      }
    } else {
      if(v < troughLevel){ troughLevel = v; troughIdx = i; }
      if(v >= recoveryTarget){
        regimes.push({type:'Bear', start: peakIdx, end: troughIdx});
        state = 'bull';
        bullStart = troughIdx;
        peakLevel = v; peakIdx = i;
      }
    }
  }
  if(state === 'bull'){
    if(n-1 > bullStart) regimes.push({type:'Bull', start: bullStart, end: n-1, isCurrent: true});
  } else {
    regimes.push({type:'Bear', start: peakIdx, end: troughIdx, isCurrent: (troughIdx === n-1)});
    if(n-1 > troughIdx) regimes.push({type:'Bull', start: troughIdx, end: n-1, isCurrent: true});
  }
  return regimes.filter(r => r.end > r.start).map((r) => {
    const sRet = s[r.end]/s[r.start] - 1;
    const bRet = b[r.end]/b[r.start] - 1;
    const delta = sRet - bRet;
    let cap = null;
    if(Math.abs(bRet) >= 0.005) cap = sRet / bRet * 100;
    const d1 = new Date(dates[r.start]); const d2 = new Date(dates[r.end]);
    const months = (d2.getFullYear() - d1.getFullYear())*12 + (d2.getMonth() - d1.getMonth());
    return {
      type: r.type, isCurrent: !!r.isCurrent, start: dates[r.start], end: dates[r.end],
      sIdx: r.start, eIdx: r.end,
      period: fmtDateShort(dates[r.start]) + ' – ' + fmtDateShort(dates[r.end]),
      months, sRet, bRet, delta, capture: cap,
    };
  });
}

function classCategory(ac, model){
  if(model.currentHoldings){
    for(const h of model.currentHoldings){
      if(h.asset_class === ac) return h.category;
    }
  }
  const a = (ac||'').toLowerCase();
  if(a.includes('bond') || a.includes('treasury') || a.includes('government') || a.includes('muni') || a.includes('tips') || a.includes('bank loan')) return 'Fixed Income';
  if(a.includes('commodit') || a.includes('mlp') || a.includes('infrastructure') || a.includes('real estate') || a.includes('liquid alt') || a.includes('defined outcome') || a.includes('multistrat')) return 'Alternative';
  if(a.includes('cash') || a.includes('money market') || a.includes('ultrashort')) return 'Cash';
  return 'Equity';
}

        <p><strong>Maximum Drawdown:</strong> The maximum observed loss from a peak to a trough of an investment, before a new peak is attained, measured as a percentage.</p>
        <p><strong>Sharpe Ratio:</strong> A risk-adjusted measure calculated by dividing the return of an investment (in excess of the risk-free rate) by its standard deviation.</p>
        <p><strong>Standard Deviation:</strong> A measure of the dispersion of a set of data from its mean, indicating the historical volatility of an investment.</p>
        <p><strong>Tracking Error:</strong> A measure of how closely an investment follows its benchmark, calculated as the standard deviation of the difference between the investment and benchmark returns.</p>
        <p><strong>Up Capture / Down Capture:</strong> The ratio of the model's return to the benchmark's return during bull (up) or bear (down) regimes, expressed as a percentage. A down capture below 100% indicates the model declined less than the benchmark during the bear regime.</p>

        <h4>Asset Class Index Mappings</h4>

        </div>

    </details>
  `;

function rebalanceLabel(r){
  return {A:'Annual', M:'Monthly', Q:'Quarterly', BM:'Bi-Monthly', SA:'Semi-Annual'}[r] || (r||'—');
}
function trackYears(s){
  const start = new Date(s.startDate); const end = new Date(s.asOf);
  return ((end - start)/(365.25*24*3600*1000)).toFixed(1);
}
function formatProse(t){
  if(!t) return '<p style="color:#999">No description available.</p>';
  return t.split(/\n+/).map(p => `<p>${p}</p>`).join('');
}

function kpiPctDelta(label, val, bmk, d=1, isNeg=false, lowerIsBetter=false){
  const delta = (val!=null && bmk!=null) ? (val - bmk) : null;
  const valCls = isNeg ? 'neg' : (val!=null && val>=0 ? 'pos' : (val!=null?'neg':''));
  let dCls = 'flat';
  if(delta!=null){
    if(lowerIsBetter) dCls = delta<0 ? 'pos' : (delta>0 ? 'neg' : 'flat');
    else dCls = delta>0 ? 'pos' : (delta<0 ? 'neg' : 'flat');
  }
  const dStr = delta==null ? '' : 'Δ '+fmtPctSigned(delta, d);
  return `<div class="kpi">
    <div class="label">${label}</div>
    <div class="val ${valCls}">${fmtPct(val, d)}</div>
    <div class="bmk-row"><span class="bmk-lbl">Bmk</span><span class="bmk-val">${fmtPct(bmk, d)}</span></div>
    <span class="delta ${dCls}">${dStr}</span>
  </div>`;
}
function kpiNumDelta(label, val, bmk, d=2){
  const delta = (val!=null && bmk!=null) ? (val - bmk) : null;
  const valCls = val!=null && val>=0 ? 'pos' : (val!=null?'neg':'');
  const dCls = delta==null ? 'flat' : (delta>0 ? 'pos' : (delta<0 ? 'neg' : 'flat'));
  const dStr = delta==null ? '' : 'Δ '+fmtNumSigned(delta, d);
  return `<div class="kpi">
    <div class="label">${label}</div>
    <div class="val ${valCls}">${fmtNum(val, d)}</div>
    <div class="bmk-row"><span class="bmk-lbl">Bmk</span><span class="bmk-val">${fmtNum(bmk, d)}</span></div>
    <span class="delta ${dCls}">${dStr}</span>
  </div>`;
}
function kpiPctDeltaMaxDD(label, val, bmk, d=1){

  const dCls = delta==null ? 'flat' : (delta>0 ? 'pos' : (delta<0 ? 'neg' : 'flat'));

function buildTabCharts(s, a){
  destroyCharts();

  else if(activeTab === 'strat') buildStratCharts(s, a);

function buildStratCharts(s, a){
  const strats = (s.underlyingStrategies||[]).slice().sort((x,y) => y.weight - x.weight);
  const maxW = strats.reduce((m,x)=> Math.max(m, x.weight), 0.01);

  // Theme totals
  const themeMap = {
    eq:{label:'Equity Sleeves', color:COLORS.navy},
    fi:{label:'Fixed Income Sleeves', color:COLORS.sage},
    tactical:{label:'Tactical / Macro', color:COLORS.plum},
    alt:{label:'Alternative Income', color:COLORS.terra},
    cash:{label:'Cash', color:COLORS.gold},
    other:{label:'Other', color:COLORS.slate},
  };
  const themeTotals = {};
  strats.forEach(st => {
    const t = STRATEGY_CATEGORY[st.name] || 'other';
    themeTotals[t] = (themeTotals[t] || 0) + st.weight;
  });

  // Render bars
  document.getElementById('strategy-bars').innerHTML = strats.map(st => {
    const t = STRATEGY_CATEGORY[st.name] || 'other';
    const wPct = (st.weight/maxW)*100;
    return `<div class="strategy-row">
      <div class="sn-name"><span class="sn-num">#${st.num||'—'}</span>${st.name}</div>
      <div class="sn-bar"><div class="sn-bar-fill ${t}" style="width:${wPct}%"></div></div>
      <div class="sn-w">${(st.weight*100).toFixed(0)}%</div>
    </div>`;
  }).join('');

  // Theme detail table
  document.getElementById('tbl-strategies').innerHTML = strats.map(st => {
    const t = STRATEGY_CATEGORY[st.name] || 'other';
    const tinfo = themeMap[t];
    return `<tr>
      <td>${st.num||'—'}</td>
      <td>${st.name}</td>
      <td><span style="display:inline-block;width:8px;height:8px;background:${tinfo.color};margin-right:6px"></span>${tinfo.label}</td>
      <td class="hl">${(st.weight*100).toFixed(1)}%</td>
    </tr>`;
  }).join('');

  // Theme donut
  const themeKeys = Object.keys(themeTotals).sort((a,b)=> themeTotals[b]-themeTotals[a]);
  currentCharts.push(new Chart(document.getElementById('chart-strat-theme'), {
    type:'doughnut',
    data:{labels: themeKeys.map(k => themeMap[k].label),
      datasets:[{data: themeKeys.map(k => themeTotals[k]*100),
        backgroundColor: themeKeys.map(k => themeMap[k].color),
        borderWidth:2, borderColor:'#fff'}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:'58%',
      plugins:{
        legend:{position:'right', labels:{font:{family:'Lato',size:10}, boxWidth:10, padding:8}},
        tooltip:{callbacks:{label:ctx => `${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}
      }}
  }));
}

function buildExposureCharts(s, a){
  const h = s.holdingsHistory;
  const cats = ['Equity','Fixed Income','Alternative','Cash'];
  const lastIdx = h.weights.length - 1;
  const catVals = cats.map(c => (h.categories[c]||[])[lastIdx] || 0);
  const catColors = cats.map(c => CATEGORY_COLOR[c]);
  const nonZeroCats = cats.map((c,i)=>({c, v: catVals[i], color: catColors[i]})).filter(x => x.v > 0.001);
  currentCharts.push(new Chart(document.getElementById('chart-donut-cat'), {
    type:'doughnut',
    data:{labels:nonZeroCats.map(x=>x.c), datasets:[{data:nonZeroCats.map(x=>x.v*100), backgroundColor:nonZeroCats.map(x=>x.color), borderWidth:2, borderColor:'#fff'}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{legend:{display:false}, tooltip:{callbacks:{label: ctx => `${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}}}
  }));
  document.getElementById('legend-cat').innerHTML = nonZeroCats.map(x => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #F0F0EE">
      <span style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:${x.color};display:inline-block"></span>${x.c}</span>
      <span style="font-weight:700;color:#333">${(x.v*100).toFixed(1)}%</span>
    </div>`).join('');

  const acColorMap = buildACColorMap(s);
  const acData = h.classes
    .map((c,i) => ({c, v: h.weights[lastIdx][i], color: acColorMap[c] || CATEGORY_SHADES['Alternative'][0]}))
    .filter(x => x.v > 0.001)
    .sort((a,b) => b.v - a.v)
    .slice(0, 14);
  currentCharts.push(new Chart(document.getElementById('chart-donut-ac'), {
    type:'doughnut',
    data:{labels:acData.map(x=>x.c), datasets:[{data:acData.map(x=>x.v*100), backgroundColor:acData.map(x=>x.color), borderWidth:2, borderColor:'#fff'}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{legend:{display:false}, tooltip:{callbacks:{label: ctx => `${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}}}
  }));
  document.getElementById('legend-ac').innerHTML = acData.map(x => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #F4F4F0">
      <span style="display:flex;align-items:center;gap:8px;overflow:hidden;text-overflow:ellipsis"><span style="width:10px;height:10px;background:${x.color};display:inline-block;flex-shrink:0"></span>${x.c}</span>
      <span style="font-weight:700;color:#333;flex-shrink:0">${(x.v*100).toFixed(1)}%</span>
    </div>`).join('');

  // Holdings list grouped by category
  const holdings = (s.currentHoldings||[]).slice();
  const catOrder = {'Equity':0,'Fixed Income':1,'Alternative':2,'Cash':3};
  holdings.sort((x,y) => (catOrder[x.category]??99) - (catOrder[y.category]??99) || y.weight - x.weight);
  let html = `<div class="holding-row head">
    <span>Asset Class</span><span>Ticker</span><span>Holding</span><span>Weight</span><span>Expense Ratio</span><span>Yield</span>
  </div>`;
  let prevCat = null;
  let catTot = 0;
  // Pre-compute totals per category
  const catTotals = {};
  holdings.forEach(hr => { catTotals[hr.category] = (catTotals[hr.category]||0) + hr.weight; });
  holdings.forEach(hr => {
    if(hr.category !== prevCat){
      const ccls = hr.category==='Fixed Income'?'cat-fi':hr.category==='Alternative'?'cat-alt':hr.category==='Cash'?'cat-cash':'cat-equity';
      html += `<div class="holdings-cat-header ${ccls}"><span>${hr.category}</span><span class="ch-tot">${(catTotals[hr.category]*100).toFixed(0)}%</span></div>`;
      prevCat = hr.category;
    }
    const cc = CATEGORY_COLOR[hr.category] || COLORS.slate;
    html += `<div class="holding-row">
      <span class="hrac"><span class="holding-cat-dot" style="background:${cc}"></span>${hr.asset_class||''}</span>
      <span class="hrt">${hr.ticker||''}</span>
      <span class="hrn">${hr.name}</span>
      <span class="hrw">${(hr.weight*100).toFixed(1)}%</span>
      <span class="hre">${hr.expense_ratio!=null?(hr.expense_ratio*100).toFixed(2)+'%':'—'}</span>
      <span class="hry">${hr['yield']!=null?(hr['yield']*100).toFixed(2)+'%':'—'}</span>
    </div>`;
  });
  document.getElementById('holdings-list').innerHTML = html;
}

function riskColor(r){
  if(r==null) return COLORS.slate;
  if(r<30) return COLORS.sage;
  if(r<50) return COLORS.teal;
  if(r<70) return COLORS.navy;
  if(r<85) return COLORS.gold;
  return COLORS.terra;
}

renderFilters();
renderSidebar();
renderMain();

document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT') return;
  const idx = MODELS.findIndex(x=>x.id===activeId);
  if(e.key==='ArrowDown' && idx < MODELS.length-1){ activeId = MODELS[idx+1].id; renderSidebar(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
  else if(e.key==='ArrowUp' && idx > 0){ activeId = MODELS[idx-1].id; renderSidebar(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
});
</script>
</body>
</html>
